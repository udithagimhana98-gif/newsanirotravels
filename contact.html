<script>
const params = new URLSearchParams(window.location.search);
const packageDetails = params.get("package");

if (packageDetails) {
    document.getElementById("subject").value = 
        "Booking Request - " + packageDetails;

    document.getElementById("message").value =
        "Hello New Saniro Travels,\n\n" +
        "I would like to book the following package:\n\n" +
        packageDetails +
        "\n\nPlease send me more details.\n\nThank you.";
}

/* SEND EMAIL */
document.getElementById("contactForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let subject = document.getElementById("subject").value;
    let message = document.getElementById("message").value;

    let mailtoLink = 
        "mailto:info@newsanirotravels.com" +
        "?subject=" + encodeURIComponent(subject) +
        "&body=" + encodeURIComponent(
            "Name: " + name + "\n" +
            "Email: " + email + "\n\n" +
            message
        );

    window.location.href = mailtoLink;
});
</script>

        if(subjectField){
            subjectField.value = "Booking Inquiry - " + packageName;

        if(messageField){

            "I would like to book the following package:\n\n" +
            packageName +
            "\n\nPlease send me more details about availability and pricing.\n\nThank you.";
        }
    }
}
